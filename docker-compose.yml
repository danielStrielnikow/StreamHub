services:

  # DATABASES 

  postgres:
    image: postgres:16-alpine
    container_name: streamflix-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamflix-net

  redis:
    image: redis:7-alpine
    container_name: streamflix-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - streamflix-net

  # REDPANDA 

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: streamflix-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,PLAINTEXT_HOST://localhost:9092
    ports:
      - "9092:9092"     # dostęp z hosta (IntelliJ, testy lokalne)
      - "9644:9644"     # Redpanda Admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - streamflix-net

  # KEYCLOAK

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: streamflix-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8090
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/health/ready || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    networks:
      - streamflix-net

  # MAIL (dev only)

  mailpit:
    image: axllent/mailpit:latest
    container_name: streamflix-mailpit
    ports:
      - "1025:1025"   # SMTP — Spring Boot wysyła tutaj
      - "8025:8025"   # Web UI — otwórz http://localhost:8025
    networks:
      - streamflix-net

